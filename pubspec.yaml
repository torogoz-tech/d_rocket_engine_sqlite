name: d_rocket_engine_sqlite
description: >-
  SQLite engine for d_rocket 2.0: bundles libsqlite3 (and
  the SQLCipher probe) to drive DbContext / DbSet / LINQ-SQL
  push-down and auto-migrations on iOS, Android, macOS,
  Linux, and Windows.
version: 2.0.0

repository: https://github.com/torogoz-tech/d_rocket_engine_sqlite
homepage: https://github.com/torogoz-tech/d_rocket_engine_sqlite
issue_tracker: https://github.com/torogoz-tech/d_rocket_engine_sqlite/issues
documentation: https://github.com/torogoz-tech/d_rocket_engine_sqlite/blob/main/README.md

topics:
  - sqlite
  - sqlcipher
  - d-rocket
  - orm
  - database

environment:
  sdk: ^3.6.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  d_rocket: ^2.0.0
  sqlite3: ^3.0.0
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
  test: ^1.30.0

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  # No `web:` — sqlite3 is a dart:ffi binding and
  # does not compile to JS / WASM. Web support
  # requires a separate d_rocket_engine_libsql_wasm
  # engine.
