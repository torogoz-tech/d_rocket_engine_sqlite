name: d_rocket_engine_sqlite
description: >-
  SQLite engine for d_rocket 2.0: bundles libsqlite3 (and
  the SQLCipher probe) to drive DbContext / DbSet / LINQ-SQL
  push-down and auto-migrations on iOS, Android, macOS,
  Linux, and Windows.
version: 2.0.0

repository: https://github.com/torogoz-tech/d_rocket_engine_sqlite
homepage: https://github.com/torogoz-tech/d_rocket_engine_sqlite
issue_tracker: https://github.com/torogoz-tech/d_rocket_engine_sqlite/issues
documentation: https://github.com/torogoz-tech/d_rocket_engine_sqlite/blob/main/README.md

topics:
  - sqlite
  - sqlcipher
  - d-rocket
  - orm
  - database

environment:
  sdk: ^3.6.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  d_rocket: ^2.0.0
  sqlite3: ^3.0.0
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
  test: ^1.30.0

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  # No `web:` — sqlite3 is a dart:ffi binding and
  # does not compile to JS / WASM. Web support
  # requires a separate d_rocket_engine_libsql_wasm
  # engine.

executables:
  # The runtime half of the d_rocket migration
  # CLI: handles the subcommands that need a real
  # SQLite engine (status / run / rollback). The
  # scaffolder half (add / list / doctor) lives in
  # the d_rocket core package as
  # `d_rocket:migration`. See d_rocket/bin/migration.dart
  # and doc/11-cli.md for the split rationale.
  migration: migration
